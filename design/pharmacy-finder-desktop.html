<title>약국 어디가 — 데스크탑 프로토타입</title>
<style>
  :root{
    --bg:#E8EFF2; --ink:#0E2A33; --muted:#5E7C88; --line:#E4EDF1;
    --card:#FFFFFF; --primary:#0B8FAC; --primary-deep:#086B82; --accent:#22D3EE;
    --map:#0C2A33; --map-road:rgba(120,200,220,.10); --map-road2:rgba(120,200,220,.05);
    --open:#16A34A; --closing:#EA9006; --closed:#94A3B8;
    --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);overflow:hidden}

  .app{display:grid;grid-template-columns:412px 1fr;height:100vh;min-height:560px;position:relative;
    box-shadow:0 0 0 1px var(--line)}
  @media(max-width:820px){ .app{grid-template-columns:340px 1fr} }

  /* ---------- SIDEBAR ---------- */
  .side{position:relative;background:#fff;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:14px 0 40px -28px rgba(8,53,66,.4);z-index:2}
  .brand{display:flex;align-items:center;gap:11px;padding:22px 24px 16px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--primary-deep));
    display:grid;place-items:center;color:#fff;box-shadow:0 8px 18px -8px rgba(11,143,172,.8)}
  .brand .nm{font-size:18px;font-weight:800;letter-spacing:-.5px}
  .brand .loc{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px}
  .brand .loc b{color:var(--primary-deep);font-weight:700}

  .sbsearch{padding:0 24px}
  .search{background:#f3f7f9;border:1px solid var(--line);border-radius:13px;height:48px;display:flex;align-items:center;gap:10px;padding:0 14px;
    transition:border-color .2s,background .2s}
  .search:focus-within{background:#fff;border-color:var(--primary)}
  .search .ic{color:var(--primary);flex:none}
  .search input{border:0;outline:0;font:inherit;font-size:14.5px;color:var(--ink);width:100%;background:none}
  .search input::placeholder{color:#9fb3bc}
  .chips{display:flex;gap:8px;margin:13px 24px 4px;flex-wrap:wrap}
  .chip{background:#f0f5f7;border:0;color:#3a5560;font:inherit;font-size:13px;font-weight:600;padding:8px 13px;border-radius:999px;cursor:pointer;transition:.15s}
  .chip:hover{background:#e6eef1}
  .chip.on{background:var(--primary);color:#fff}

  .listhead{padding:16px 24px 8px;display:flex;align-items:baseline;justify-content:space-between}
  .listhead h1{margin:0;font-size:16px;font-weight:800;letter-spacing:-.3px}
  .listhead h1 em{color:var(--primary);font-style:normal}
  .listhead .by{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .livedot{width:7px;height:7px;border-radius:50%;background:var(--open);animation:beat 1.8s infinite}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}

  .list{flex:1;overflow-y:auto;padding:6px 16px 22px}
  .list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:#dce6ea;border-radius:99px}

  .card{border:1px solid var(--line);border-radius:15px;padding:14px 15px;margin-bottom:10px;cursor:pointer;
    opacity:0;transform:translateY(12px);transition:opacity .45s,transform .18s,box-shadow .2s,border-color .2s}
  .card.in{opacity:1;transform:none}
  .card:hover{border-color:var(--primary);box-shadow:0 14px 30px -18px rgba(11,143,172,.6);transform:translateY(-2px)}
  .crow{display:flex;align-items:center;gap:9px}
  .cname{font-size:16px;font-weight:700;letter-spacing:-.3px}
  .status{flex:none;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
  .status .d{width:6px;height:6px;border-radius:50%}
  .status.open{background:rgba(22,163,74,.12);color:#137a3a}.status.open .d{background:var(--open);animation:beat 1.8s infinite}
  .status.closing{background:rgba(234,144,6,.14);color:#b06d04}.status.closing .d{background:var(--closing)}
  .status.closed{background:#eef2f4;color:#6b7f88}.status.closed .d{background:var(--closed)}
  .cmeta{margin-top:6px;display:flex;align-items:center;justify-content:space-between}
  .cmeta .hrs{font-size:13px;color:#3a5560}
  .cmeta .km{font-size:15px;font-weight:800;color:var(--primary-deep);font-variant-numeric:tabular-nums}
  .cmeta .km small{font-size:11px;color:#9fb3bc;font-weight:600;margin-left:6px}

  /* detail panel slides over sidebar */
  .detail{position:absolute;inset:0;background:#fff;z-index:5;display:flex;flex-direction:column;
    transform:translateX(-100%);transition:transform .4s cubic-bezier(.22,.61,.36,1);visibility:hidden}
  .detail.open{transform:none;visibility:visible}
  .dtop{display:flex;align-items:center;gap:10px;padding:18px 22px 6px}
  .dback{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;color:var(--ink);transition:.15s}
  .dback:hover{background:#f3f7f9}
  .dscroll{flex:1;overflow-y:auto;padding:6px 22px 10px}
  .dscroll::-webkit-scrollbar{width:8px}.dscroll::-webkit-scrollbar-thumb{background:#dce6ea;border-radius:99px}
  .dhero .status{font-size:12.5px;padding:5px 11px}
  .dhero h2{margin:12px 0 5px;font-size:24px;font-weight:800;letter-spacing:-.6px}
  .dhero .sub{font-size:13.5px;color:var(--muted)}
  .dcountdown{margin-top:15px;background:rgba(22,163,74,.09);border:1px solid rgba(22,163,74,.18);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:11px}
  .dcountdown.cl{background:rgba(234,144,6,.1);border-color:rgba(234,144,6,.22)}
  .dcountdown.cd{background:#f1f4f6;border-color:var(--line)}
  .dcountdown .ic{width:34px;height:34px;border-radius:10px;background:var(--open);color:#fff;display:grid;place-items:center;flex:none}
  .dcountdown.cl .ic{background:var(--closing)} .dcountdown.cd .ic{background:var(--closed)}
  .dcountdown b{font-size:14px;color:#137a3a} .dcountdown.cl b{color:#b06d04} .dcountdown.cd b{color:#5f7178}
  .dcountdown small{display:block;color:#5f8a70;font-size:12px;margin-top:2px} .dcountdown.cl small{color:#9c7322} .dcountdown.cd small{color:#7d909b}
  h3.sh{font-size:11.5px;font-weight:800;color:#90a6af;letter-spacing:.8px;text-transform:uppercase;margin:20px 0 10px}
  .hours{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .hours .hr{display:flex;justify-content:space-between;padding:11px 15px;font-size:14px;border-top:1px solid var(--line)}
  .hours .hr:first-child{border-top:0}.hours .hr.today{background:rgba(11,143,172,.06)}
  .hours .hr .day{color:var(--muted)}.hours .hr.today .day{color:var(--primary-deep);font-weight:700}
  .hours .hr .t{font-variant-numeric:tabular-nums;font-weight:600}
  .inforow{display:flex;align-items:center;gap:13px;padding:13px 2px;border-top:1px solid var(--line)}
  .inforow:first-child{border-top:0}
  .inforow .ic{width:34px;height:34px;border-radius:10px;background:#eef4f6;color:var(--primary);display:grid;place-items:center;flex:none}
  .inforow .k{font-size:11.5px;color:var(--muted);margin-bottom:1px}.inforow .v{font-size:14.5px;font-weight:600}
  .dactions{flex:none;padding:14px 22px;display:flex;gap:10px;border-top:1px solid var(--line)}
  .dactions button{border:0;font:inherit;font-size:14.5px;font-weight:800;padding:14px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,filter .2s}
  .dactions button:active{transform:scale(.97)}
  .dactions .call2{flex:none;width:54px;background:#eef4f6;color:var(--primary-deep)}
  .dactions .nav2{flex:1;background:linear-gradient(135deg,var(--primary),var(--primary-deep));color:#fff;box-shadow:0 12px 26px -12px rgba(11,143,172,.8)}
  .dactions .nav2:hover{filter:brightness(1.06)}

  /* ---------- MAP ---------- */
  .mapwrap{position:relative;overflow:hidden;background:radial-gradient(130% 90% at 60% 30%, #123c47, var(--map) 72%)}
  .mapwrap svg.bg{position:absolute;inset:0;width:100%;height:100%}
  .me{position:absolute;left:52%;top:50%;transform:translate(-50%,-50%);z-index:5}
  .me .dot{width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 0 0 5px rgba(34,211,238,.22);position:relative;z-index:2}
  .me .ring{position:absolute;left:50%;top:50%;width:20px;height:20px;border-radius:50%;transform:translate(-50%,-50%);background:rgba(34,211,238,.32);animation:sonar 2.6s ease-out infinite}
  @keyframes sonar{0%{opacity:.7;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(9)}}

  .pin{position:absolute;transform:translate(-50%,-100%) scale(.2);opacity:0;transform-origin:bottom center;cursor:pointer;will-change:transform,opacity;z-index:6}
  .pin.in{animation:drop .55s cubic-bezier(.18,.9,.32,1.4) forwards}
  @keyframes drop{0%{transform:translate(-50%,-170%) scale(.2);opacity:0}70%{opacity:1}100%{transform:translate(-50%,-100%) scale(1);opacity:1}}
  .pin .head{width:38px;height:38px;border-radius:50% 50% 50% 3px;transform:rotate(45deg);
    background:linear-gradient(135deg,var(--primary),var(--primary-deep));box-shadow:0 8px 18px -4px rgba(8,53,66,.6);display:grid;place-items:center;transition:transform .18s}
  .pin .head b{transform:rotate(-45deg);color:#fff;font-size:15px;font-weight:800}
  .pin.s-open .head{background:linear-gradient(135deg,#1fb257,#138a43)}
  .pin.s-closing .head{background:linear-gradient(135deg,#f6a722,#e08a06)}
  .pin.s-closed .head{background:linear-gradient(135deg,#9fb0bb,#7d909b)}
  .pin.in:hover .head,.pin.active .head{transform:rotate(45deg) scale(1.16)}
  .pin.active .head{outline:3px solid rgba(34,211,238,.9);outline-offset:3px}
  .pin .tip{position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%) translateY(6px);
    background:#0e2a33;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;padding:6px 10px;border-radius:9px;
    opacity:0;pointer-events:none;transition:.18s}
  .pin .tip::after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0e2a33}
  .pin.in:hover .tip,.pin.active .tip{opacity:1;transform:translateX(-50%) translateY(0)}

  .mappill{position:absolute;top:20px;left:20px;z-index:8;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
    border-radius:13px;padding:11px 15px;display:flex;align-items:center;gap:9px;box-shadow:0 12px 30px -14px rgba(8,53,66,.5);
    opacity:0;transform:translateY(-10px);transition:.5s .2s}
  .mappill.in{opacity:1;transform:none}
  .mappill b{font-size:14px;font-weight:800}.mappill span{font-size:12px;color:var(--muted)}
  .recenter{position:absolute;right:22px;bottom:26px;z-index:8;width:48px;height:48px;border-radius:14px;border:0;background:#fff;cursor:pointer;box-shadow:0 10px 24px -10px rgba(8,53,66,.5);display:grid;place-items:center;color:var(--primary);transition:transform .15s}
  .recenter:hover{transform:scale(1.06)}.recenter:active{transform:scale(.92)}

  .radar{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle at 56% 46%, rgba(11,143,172,.16), var(--map) 72%);transition:opacity .55s}
  .radar.hide{opacity:0;pointer-events:none}
  .radar .scope{position:relative;width:300px;height:300px;border-radius:50%;border:1px solid rgba(34,211,238,.22)}
  .radar .scope::before,.radar .scope::after{content:"";position:absolute;border-radius:50%;border:1px solid rgba(34,211,238,.18);inset:50px}
  .radar .scope::after{inset:104px}
  .radar .sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 250deg,rgba(34,211,238,.4) 350deg,transparent 360deg);animation:spin 1.1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .radar .core{position:absolute;left:50%;top:50%;width:16px;height:16px;border-radius:50%;transform:translate(-50%,-50%);background:var(--accent);box-shadow:0 0 22px 5px rgba(34,211,238,.7)}
  .radar .label{position:absolute;bottom:-54px;left:0;right:0;text-align:center;color:#cdeef5;font-size:15px;font-weight:600}
  .radar .label small{display:block;color:#7fb6c4;font-size:12.5px;font-weight:500;margin-top:5px}

  .toast{position:fixed;left:50%;bottom:34px;transform:translate(-50%,16px);z-index:90;background:#0e2a33;color:#fff;font-size:13.5px;font-weight:600;padding:12px 18px;border-radius:13px;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 14px 30px -12px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition-duration:.01ms!important}}
</style>

    <div class="brand">
      <div class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><path d="M12 7v6M9 10h6"/></svg></div>
      <div><div class="nm">약국 어디가</div><div class="loc"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="3"/></svg>현재 위치 · <b>강남구 역삼동</b></div></div>

        <div class="inforow"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2Z"/></svg></div><div><div class="k">거리</div><div class="v"><span id="ddist">320</span>m · 도보 약 5분</div></div></div>

      </div>
    </div>
  </aside>

  <!-- MAP -->
  <div class="mapwrap" id="mapwrap">

    </svg>

    <div class="me"><span class="ring"></span><span class="dot"></span></div>

</div>

    {n:"온누리약국",st:"open",lbl:"운영 중",hrs:"밤 10:00까지",km:320,walk:"도보 5분",sub:"종합병원 앞 · 처방조제 가능",close:"밤 10:00까지 운영",csub:"마감까지 약 19분 남았어요",cd:"",addr:"서울 강남구 테헤란로 123",tel:"02-538-1234",x:50,y:42,tag:"약"},
    {n:"24시 이안약국",st:"open",lbl:"심야 운영",hrs:"24시간 운영",km:540,walk:"도보 7분",sub:"심야 · 연중무휴",close:"24시간 운영",csub:"밤에도 언제나 열려 있어요",cd:"",addr:"서울 강남구 강남대로 200",tel:"02-561-2424",x:36,y:33,tag:"24"},
    {n:"365열린약국",st:"open",lbl:"운영 중",hrs:"밤 11:00까지",km:780,walk:"도보 10분",sub:"역 5번 출구 앞",close:"밤 11:00까지 운영",csub:"마감까지 약 1시간 남았어요",cd:"",addr:"서울 강남구 봉은사로 88",tel:"02-552-3650",x:67,y:36,tag:"약"},
    {n:"행복한약국",st:"closing",lbl:"곧 마감",hrs:"밤 10:00까지",km:1100,walk:"도보 14분",sub:"아파트 상가 1층",close:"밤 10:00 마감 예정",csub:"마감 임박 · 서둘러 주세요",cd:"cl",addr:"서울 강남구 선릉로 145",tel:"02-538-7942",x:60,y:55,tag:"약"},
    {n:"건강샘약국",st:"closed",lbl:"영업 종료",hrs:"내일 09:00 오픈",km:1400,walk:"도보 18분",sub:"오늘 영업 종료",close:"오늘 영업 종료",csub:"내일 오전 9시에 다시 열어요",cd:"cd",addr:"서울 강남구 논현로 33",tel:"02-543-1090",x:30,y:52,tag:"약"}
  ];
  function fmt(m){return m>=1000?(m/1000).toFixed(1)+"km":m+"m";}

  var list=document.getElementById("list"), pinsBox=document.getElementById("pins");
  data.forEach(function(d,i){
    var c=document.createElement("div");
    c.className="card"; c.dataset.i=i;
    c.innerHTML='<div class="crow"><span class="cname">'+d.n+'</span><span class="status '+d.st+'"><span class="d"></span>'+d.lbl+'</span></div>'+
      '<div class="cmeta"><span class="hrs">'+d.hrs+'</span><span class="km" data-km="'+d.km+'">0m<small>'+d.walk+'</small></span></div>';
    c.addEventListener("click",function(){openDetail(i);});
    c.addEventListener("mouseenter",function(){setActive(i,true);});
    c.addEventListener("mouseleave",function(){if(!detailOpen)setActive(i,false);});
    list.appendChild(c);

    var p=document.createElement("div");
    p.className="pin s-"+d.st; p.dataset.i=i; p.style.left=d.x+"%"; p.style.top=d.y+"%";
    p.innerHTML='<div class="tip">'+d.n+'</div><div class="head"><b>'+d.tag+'</b></div>';
    p.addEventListener("click",function(){openDetail(i);});
    pinsBox.appendChild(p);
  });
  var cards=list.querySelectorAll(".card"), pins=pinsBox.querySelectorAll(".pin");

  function setActive(i,on){
    pins[i].classList.toggle("active",on);
    cards[i].style.borderColor= on? "var(--primary)":"";
  }

  // intro
  var radar=document.getElementById("radar"),mappill=document.getElementById("mappill");
  setTimeout(function(){
    radar.classList.add("hide"); mappill.classList.add("in");
    pins.forEach(function(p,i){setTimeout(function(){p.classList.add("in");},reduce?0:i*120);});
    setTimeout(function(){
      cards.forEach(function(c,i){
        setTimeout(function(){
          c.classList.add("in");
          var el=c.querySelector(".km"),target=+el.dataset.km,walk=data[i].walk;
          countUp(el,target,walk);
        },reduce?0:i*80);
      });
    },reduce?0:500);
  },reduce?0:1500);

  function countUp(el,target,walk){
    if(reduce){el.innerHTML=fmt(target)+'<small>'+walk+'</small>';return;}
    var dur=700,t=performance.now();
    function step(now){var p=Math.min(1,(now-t)/dur),e=1-Math.pow(1-p,3);
      el.innerHTML=fmt(Math.round(target*e/10)*10)+'<small>'+walk+'</small>';
      if(p<1)requestAnimationFrame(step);else el.innerHTML=fmt(target)+'<small>'+walk+'</small>';}
    requestAnimationFrame(step);
  }

  // detail
  var detail=document.getElementById("detail"),detailOpen=false,activeI=-1;
  function openDetail(i){
    var d=data[i];
    document.getElementById("dname").textContent=d.n;
    document.getElementById("dsub").textContent=d.sub;
    document.getElementById("dclose").textContent=d.close;
    document.getElementById("dclosesub").textContent=d.csub;
    document.getElementById("ddist").textContent=d.km;
    document.getElementById("daddr").textContent=d.addr;
    document.getElementById("dtel").textContent=d.tel;
    var ds=document.getElementById("dstatus");ds.className="status "+d.st;ds.innerHTML='<span class="d"></span>'+d.lbl;
    document.getElementById("dcd").className="dcountdown "+(d.cd||"");
    if(activeI>=0)setActive(activeI,false);
    activeI=i; setActive(i,true); detailOpen=true;
    detail.classList.add("open");
  }
  document.getElementById("dback").addEventListener("click",function(){
    detail.classList.remove("open");detailOpen=false;
    if(activeI>=0)setActive(activeI,false);activeI=-1;
  });

  // toast
  var toast=document.getElementById("toast"),tt;
  document.addEventListener("click",function(e){
    var b=e.target.closest("[data-toast]");if(!b)return;e.stopPropagation();
    toast.textContent=b.dataset.toast;toast.classList.add("show");
    clearTimeout(tt);tt=setTimeout(function(){toast.classList.remove("show");},1900);
  });
})();
</script>
