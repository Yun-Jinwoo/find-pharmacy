<title>약국 어디가 — 프로토타입</title>
<style>
  :root{
    --bg:#E8EFF2; --ink:#0E2A33; --muted:#5E7C88; --line:#E4EDF1;
    --card:#FFFFFF; --primary:#0B8FAC; --primary-deep:#086B82; --accent:#22D3EE;
    --map:#0C2A33; --map-road:rgba(120,200,220,.10); --map-road2:rgba(120,200,220,.05);
    --open:#16A34A; --closing:#EA9006; --closed:#94A3B8;
    --r:18px;
    --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:
      radial-gradient(900px 500px at 50% -10%, #DCEAEF, transparent 70%),
      var(--bg);
    font-family:var(--font);color:var(--ink);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px 12px}

  /* phone frame */
  .phone{position:relative;width:390px;max-width:100%;height:min(844px,94vh);
    background:#fff;border-radius:42px;overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(8,53,66,.55),0 0 0 10px #0d1f25,0 0 0 11px #1d3640;
    display:flex;flex-direction:column}
  .statusbar{position:absolute;top:0;left:0;right:0;height:46px;z-index:60;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px 0;font-size:13px;font-weight:700;color:#fff;
    letter-spacing:.3px;mix-blend-mode:difference;pointer-events:none}
  .statusbar .dots{display:flex;gap:5px;align-items:center}
  .statusbar .bar{width:17px;height:11px;border:1.5px solid #fff;border-radius:3px;position:relative}
  .statusbar .bar::after{content:"";position:absolute;inset:1.5px;right:5px;background:#fff;border-radius:1px}

  /* screen track */
  .track{display:flex;width:200%;height:100%;
    transition:transform .42s cubic-bezier(.22,.61,.36,1)}
  .track.detail{transform:translateX(-50%)}
  .screen{width:50%;height:100%;position:relative;overflow:hidden;flex:none}

  /* ---------- MAP ---------- */
  .map{position:absolute;inset:0;background:
      radial-gradient(120% 80% at 50% 22%, #123c47, var(--map) 70%)}
  .map svg{position:absolute;inset:0;width:100%;height:100%}
  .map.detailmap{position:relative;height:200px;inset:auto;border-radius:0}

  /* pins */
  .pin{position:absolute;transform:translate(-50%,-100%) scale(.2);opacity:0;
    transform-origin:bottom center;will-change:transform,opacity}
  .pin.in{animation:drop .5s cubic-bezier(.18,.9,.32,1.4) forwards}
  @keyframes drop{0%{transform:translate(-50%,-160%) scale(.2);opacity:0}
    70%{opacity:1}100%{transform:translate(-50%,-100%) scale(1);opacity:1}}
  .pin .head{width:30px;height:30px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
    background:linear-gradient(135deg,var(--primary),var(--primary-deep));
    box-shadow:0 6px 14px -3px rgba(8,53,66,.6);display:grid;place-items:center}
  .pin .head b{transform:rotate(-45deg);color:#fff;font-size:13px;font-weight:800}
  .pin.s-open .head{background:linear-gradient(135deg,#1fb257,#138a43)}
  .pin.s-closing .head{background:linear-gradient(135deg,#f6a722,#e08a06)}
  .pin.s-closed .head{background:linear-gradient(135deg,#9fb0bb,#7d909b)}
  .pin.active .head{outline:3px solid rgba(34,211,238,.9);outline-offset:2px}

  /* my location */
  .me{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);z-index:5}
  .me .dot{width:18px;height:18px;border-radius:50%;background:var(--accent);
    border:3px solid #fff;box-shadow:0 0 0 4px rgba(34,211,238,.25);position:relative;z-index:2}
  .me .ring{position:absolute;left:50%;top:50%;width:18px;height:18px;border-radius:50%;
    transform:translate(-50%,-50%);background:rgba(34,211,238,.35)}
  .me .ring{animation:sonar 2.4s ease-out infinite}
  @keyframes sonar{0%{opacity:.7;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(7)}}

  /* radar loader */
  .radar{position:absolute;inset:0;z-index:40;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 46%, rgba(11,143,172,.18), var(--map) 70%);
    transition:opacity .5s ease}
  .radar.hide{opacity:0;pointer-events:none}
  .radar .scope{position:relative;width:230px;height:230px;border-radius:50%;
    border:1px solid rgba(34,211,238,.25)}
  .radar .scope::before,.radar .scope::after{content:"";position:absolute;border-radius:50%;
    border:1px solid rgba(34,211,238,.2);inset:38px}
  .radar .scope::after{inset:78px}
  .radar .sweep{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg, transparent 0deg, rgba(34,211,238,.0) 250deg, rgba(34,211,238,.45) 350deg, transparent 360deg);
    animation:spin 1.1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .radar .core{position:absolute;left:50%;top:50%;width:14px;height:14px;border-radius:50%;
    transform:translate(-50%,-50%);background:var(--accent);box-shadow:0 0 18px 4px rgba(34,211,238,.7)}
  .radar .label{position:absolute;bottom:128px;left:0;right:0;text-align:center;color:#cdeef5;
    font-size:14px;font-weight:600;letter-spacing:.2px}
  .radar .label small{display:block;color:#7fb6c4;font-size:12px;font-weight:500;margin-top:4px}

  /* top search bar */
  .topbar{position:absolute;top:52px;left:14px;right:14px;z-index:30;
    opacity:0;transform:translateY(-12px);transition:opacity .5s .15s,transform .5s .15s}
  .topbar.in{opacity:1;transform:none}
  .search{background:#fff;border-radius:14px;height:50px;display:flex;align-items:center;gap:10px;
    padding:0 14px;box-shadow:0 10px 24px -10px rgba(8,53,66,.4)}
  .search .ic{color:var(--primary);flex:none}
  .search input{border:0;outline:0;font:inherit;font-size:15px;color:var(--ink);width:100%;background:none}
  .search input::placeholder{color:#9fb3bc}
  .chips{display:flex;gap:8px;margin-top:10px;overflow:auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;background:rgba(255,255,255,.92);border:0;color:#235; font:inherit;font-size:13px;
    font-weight:600;padding:8px 13px;border-radius:999px;box-shadow:0 4px 12px -6px rgba(8,53,66,.5);cursor:pointer}
  .chip.on{background:var(--primary);color:#fff}

  /* recenter button */
  .recenter{position:absolute;right:16px;z-index:25;bottom:calc(46% + 12px);
    width:46px;height:46px;border-radius:14px;border:0;background:#fff;cursor:pointer;
    box-shadow:0 8px 20px -8px rgba(8,53,66,.5);display:grid;place-items:center;color:var(--primary);
    transition:bottom .42s cubic-bezier(.22,.61,.36,1),transform .15s}
  .recenter:active{transform:scale(.92)}

  /* ---------- BOTTOM SHEET ---------- */
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:35;background:#fff;
    border-radius:26px 26px 0 0;box-shadow:0 -16px 40px -20px rgba(8,53,66,.45);
    height:88%;transform:translateY(54%);
    transition:transform .42s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column;
    touch-action:none}
  .sheet.up{transform:translateY(0)}
  .sheet.intro{transform:translateY(110%)}
  .grip{padding:11px 0 6px;display:flex;justify-content:center;cursor:grab;flex:none}
  .grip span{width:42px;height:5px;border-radius:99px;background:#d3dfe4}
  .sheethead{padding:2px 20px 12px;flex:none}
  .sheethead h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.4px}
  .sheethead h1 em{color:var(--primary);font-style:normal}
  .sheethead p{margin:4px 0 0;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .livedot{width:7px;height:7px;border-radius:50%;background:var(--open);box-shadow:0 0 0 0 rgba(22,163,74,.5);animation:beat 1.8s infinite}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}

  .list{overflow-y:auto;padding:4px 14px 26px;flex:1;-webkit-overflow-scrolling:touch}
  .list::-webkit-scrollbar{width:0}

  .card{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-radius:16px;padding:14px;margin-bottom:11px;cursor:pointer;
    opacity:0;transform:translateY(14px);
    transition:transform .14s ease,box-shadow .2s ease,border-color .2s}
  .card.in{opacity:1;transform:none;transition:opacity .45s,transform .45s}
  .card:active{transform:scale(.985)}
  .card:hover{box-shadow:0 12px 26px -16px rgba(8,53,66,.4);border-color:#cfe1e7}
  .badge{flex:none;width:46px;height:46px;border-radius:13px;display:grid;place-items:center;
    background:rgba(11,143,172,.1);color:var(--primary)}
  .cbody{flex:1;min-width:0}
  .crow{display:flex;align-items:center;gap:8px}
  .cname{font-size:16px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status{flex:none;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
  .status .d{width:6px;height:6px;border-radius:50%}
  .status.open{background:rgba(22,163,74,.12);color:#137a3a}
  .status.open .d{background:var(--open);animation:beat 1.8s infinite}
  .status.closing{background:rgba(234,144,6,.14);color:#b06d04}
  .status.closing .d{background:var(--closing)}
  .status.closed{background:#eef2f4;color:#6b7f88}
  .status.closed .d{background:var(--closed)}
  .cmeta{margin-top:5px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .cmeta .hrs{color:#3a5560}
  .dist{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:7px;padding-left:4px}
  .dist .km{font-size:16px;font-weight:800;color:var(--primary-deep);font-variant-numeric:tabular-nums;letter-spacing:-.3px}
  .dist .walk{font-size:11px;color:#9fb3bc}
  .mini{display:flex;gap:8px;margin-top:11px}
  .mini button{flex:1;border:0;font:inherit;font-size:13px;font-weight:700;padding:9px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .12s}
  .mini button:active{transform:scale(.96)}
  .mini .call{background:#eef4f6;color:var(--primary-deep)}
  .mini .nav{background:var(--primary);color:#fff}

  /* ---------- DETAIL ---------- */
  .detail{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column}
  .dback{position:absolute;top:54px;left:14px;z-index:20;width:42px;height:42px;border-radius:13px;border:0;
    background:rgba(255,255,255,.9);backdrop-filter:blur(6px);cursor:pointer;display:grid;place-items:center;color:var(--ink);
    box-shadow:0 6px 16px -8px rgba(8,53,66,.5)}
  .dscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .dscroll::-webkit-scrollbar{width:0}
  .dhero{padding:20px 22px 22px;background:linear-gradient(180deg,#fff, #f4f9fa)}
  .dhero .status{font-size:12.5px;padding:5px 11px}
  .dhero h2{margin:12px 0 6px;font-size:25px;font-weight:800;letter-spacing:-.7px;text-wrap:balance}
  .dhero .sub{font-size:13.5px;color:var(--muted)}
  .dcountdown{margin-top:14px;background:rgba(22,163,74,.09);border:1px solid rgba(22,163,74,.18);
    border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:11px}
  .dcountdown .ic{width:34px;height:34px;border-radius:10px;background:var(--open);color:#fff;display:grid;place-items:center;flex:none}
  .dcountdown b{font-size:14px;color:#137a3a}
  .dcountdown small{display:block;color:#5f8a70;font-size:12px;margin-top:2px}

  .section{padding:6px 22px 4px}
  .section h3{font-size:12px;font-weight:800;color:#90a6af;letter-spacing:.8px;text-transform:uppercase;margin:18px 0 10px}
  .hours{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .hours .hr{display:flex;justify-content:space-between;padding:11px 15px;font-size:14px;border-top:1px solid var(--line)}
  .hours .hr:first-child{border-top:0}
  .hours .hr.today{background:rgba(11,143,172,.06)}
  .hours .hr .day{color:var(--muted)}
  .hours .hr.today .day{color:var(--primary-deep);font-weight:700}
  .hours .hr .t{font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:-.2px}
  .hours .hr .off{color:var(--closed);font-weight:600}

  .info{display:flex;flex-direction:column;gap:2px}
  .inforow{display:flex;align-items:center;gap:13px;padding:13px 2px;border-top:1px solid var(--line)}
  .inforow:first-child{border-top:0}
  .inforow .ic{width:34px;height:34px;border-radius:10px;background:#eef4f6;color:var(--primary);display:grid;place-items:center;flex:none}
  .inforow .v{font-size:14.5px;font-weight:600}
  .inforow .k{font-size:11.5px;color:var(--muted);margin-bottom:1px}

  .dactions{flex:none;padding:14px 18px calc(18px + env(safe-area-inset-bottom));display:flex;gap:10px;
    border-top:1px solid var(--line);background:#fff}
  .dactions button{flex:1;border:0;font:inherit;font-size:15px;font-weight:800;padding:15px;border-radius:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,box-shadow .2s}
  .dactions button:active{transform:scale(.97)}
  .dactions .call2{flex:none;width:58px;background:#eef4f6;color:var(--primary-deep)}
  .dactions .nav2{background:linear-gradient(135deg,var(--primary),var(--primary-deep));color:#fff;box-shadow:0 12px 26px -12px rgba(11,143,172,.8)}

  /* toast */
  .toast{position:absolute;left:50%;bottom:40px;transform:translate(-50%,20px);z-index:90;
    background:#0e2a33;color:#fff;font-size:13.5px;font-weight:600;padding:12px 18px;border-radius:13px;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 14px 30px -12px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition-duration:.01ms!important}
  }
</style>

<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span class="dots"><svg width="17" height="11" viewBox="0 0 17 11" fill="#fff"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg><span class="bar"></span></span>

  <div class="track" id="track">

          <div class="section">
            <h3>정보</h3>
            <div class="info">
              <div class="inforow"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg></div><div><div class="k">주소</div><div class="v">서울 강남구 테헤란로 123</div></div></div>
              <div class="inforow"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z"/></svg></div><div><div class="k">전화</div><div class="v">02-538-1234</div></div></div>
              <div class="inforow"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2Z"/></svg></div><div><div class="k">거리</div><div class="v"><span id="ddist">320</span>m · 도보 약 5분</div></div></div>
            </div>
          </div>
        </div>
        <div class="dactions">
          <button class="call2" data-toast="전화 연결은 실제 기기에서 작동해요">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z"/></svg>
          </button>
          <button class="nav2" data-toast="카카오·네이버 지도 길찾기로 연결돼요">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2Z"/></svg>
            길찾기
          </button>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
  var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

  var data = [
    {n:"온누리약국", st:"open", lbl:"운영 중", hrs:"밤 10:00까지", km:320, walk:"도보 5분", sub:"종합병원 앞 · 처방조제 가능", close:"밤 10:00까지 운영", csub:"마감까지 약 19분 남았어요"},
    {n:"24시 이안약국", st:"open", lbl:"심야 운영", hrs:"24시간 운영", km:540, walk:"도보 7분", sub:"심야 · 연중무휴", close:"24시간 운영", csub:"밤에도 언제나 열려 있어요"},
    {n:"365열린약국", st:"open", lbl:"운영 중", hrs:"밤 11:00까지", km:780, walk:"도보 10분", sub:"역 5번 출구 앞", close:"밤 11:00까지 운영", csub:"마감까지 약 1시간 남았어요"},
    {n:"행복한약국", st:"closing", lbl:"곧 마감", hrs:"밤 10:00까지", km:1100, walk:"도보 14분", sub:"아파트 상가 1층", close:"밤 10:00 마감 예정", csub:"마감 임박 · 서둘러 주세요"},
    {n:"건강샘약국", st:"closed", lbl:"영업 종료", hrs:"내일 09:00 오픈", km:1400, walk:"도보 18분", sub:"오늘 영업 종료", close:"오늘 영업 종료", csub:"내일 오전 9시에 다시 열어요"}
  ];
  var icons={open:"약",closing:"약",closed:"약"};
  var list=document.getElementById("list");
  data.forEach(function(d,i){
    var c=document.createElement("div");
    c.className="card";
    c.innerHTML=
      '<div class="badge"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a3 3 0 0 1 6 0v2M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12"/><path d="M12 11v6M9 14h6"/></svg></div>'+
      '<div class="cbody"><div class="crow"><span class="cname">'+d.n+'</span>'+
        '<span class="status '+d.st+'"><span class="d"></span>'+d.lbl+'</span></div>'+
        '<div class="cmeta"><span class="hrs">'+d.hrs+'</span></div>'+
        '<div class="mini"><button class="call" data-toast="전화 연결은 실제 기기에서 작동해요"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z"/></svg>전화</button>'+
        '<button class="nav" data-toast="카카오·네이버 지도 길찾기로 연결돼요"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2Z"/></svg>길찾기</button></div>'+
      '</div>'+
      '<div class="dist"><span class="km" data-km="'+d.km+'">0m</span><span class="walk">'+d.walk+'</span></div>';
    c.addEventListener("click",function(e){
      if(e.target.closest("button")) return;
      openDetail(d);
    });
    list.appendChild(c);
  });

  function fmt(m){ return m>=1000 ? (m/1000).toFixed(1)+"km" : m+"m"; }

  // intro sequence
  var radar=document.getElementById("radar"), topbar=document.getElementById("topbar"),
      sheet=document.getElementById("sheet"), pins=document.querySelectorAll(".pin[data-i]");

  function start(){
    var t0 = reduce?0:1500;
    setTimeout(function(){
      radar.classList.add("hide");
      topbar.classList.add("in");
      pins.forEach(function(p,i){ setTimeout(function(){p.classList.add("in");}, reduce?0:i*120); });
      setTimeout(function(){
        sheet.classList.remove("intro"); sheet.classList.add("up");
        // reveal cards + count up
        var cards=list.querySelectorAll(".card");
        cards.forEach(function(c,i){
          setTimeout(function(){
            c.classList.add("in");
            var el=c.querySelector(".km"), target=+el.dataset.km;
            countUp(el,target);
          }, reduce?0:i*70);
        });
      }, reduce?0:600);
    }, t0);
  }
  function countUp(el,target){
    if(reduce){ el.textContent=fmt(target); return; }
    var dur=700, t=performance.now();
    function step(now){
      var p=Math.min(1,(now-t)/dur), e=1-Math.pow(1-p,3);
      el.textContent=fmt(Math.round(target*e/10)*10);
      if(p<1) requestAnimationFrame(step); else el.textContent=fmt(target);
    }
    requestAnimationFrame(step);
  }
  start();

  // bottom sheet drag
  var grip=document.getElementById("grip"), dragging=false, startY=0, base=0;
  var H = function(){ return sheet.getBoundingClientRect().height; };
  function setY(px){ sheet.style.transform="translateY("+px+"px)"; }
  grip.addEventListener("pointerdown",function(e){
    dragging=true; startY=e.clientY;
    base = sheet.classList.contains("up")?0:H()*0.54;
    sheet.style.transition="none"; grip.setPointerCapture(e.pointerId);
  });
  grip.addEventListener("pointermove",function(e){
    if(!dragging)return;
    var y=Math.max(0,Math.min(H()*0.54, base+(e.clientY-startY)));
    setY(y);
  });
  grip.addEventListener("pointerup",function(e){
    if(!dragging)return; dragging=false;
    sheet.style.transition=""; sheet.style.transform="";
    var moved=e.clientY-startY;
    if(moved<-30){ sheet.classList.add("up"); }
    else if(moved>30){ sheet.classList.remove("up"); }
  });

  // recenter follows sheet
  var recenter=document.getElementById("recenter");

  // detail nav
  var track=document.getElementById("track");
  function openDetail(d){
    document.getElementById("dname").textContent=d.n;
    document.getElementById("dsub").textContent=d.sub;
    document.getElementById("dclose").textContent=d.close;
    document.getElementById("dclosesub").textContent=d.csub;
    document.getElementById("ddist").textContent=d.km;
    var ds=document.getElementById("dstatus");
    ds.className="status "+d.st; ds.innerHTML='<span class="d"></span>'+d.lbl;
    track.classList.add("detail");
  }
  document.getElementById("dback").addEventListener("click",function(){ track.classList.remove("detail"); });

  // toast
  var toast=document.getElementById("toast"), tt;
  document.addEventListener("click",function(e){
    var b=e.target.closest("[data-toast]");
    if(!b)return;
    toast.textContent=b.dataset.toast; toast.classList.add("show");
    clearTimeout(tt); tt=setTimeout(function(){toast.classList.remove("show");},1900);
  });
})();
</script>
