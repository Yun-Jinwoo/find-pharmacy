<title>Status Badge</title>
<style>
  :root{--open:#16A34A;--closing:#EA9006;--closed:#94A3B8;
    --font:-apple-system,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",system-ui,sans-serif}
  *{box-sizing:border-box;margin:0}
  body{font-family:var(--font);background:#E8EFF2;padding:30px;display:flex;flex-direction:column;gap:16px;align-items:flex-start}
  .status{font-size:13px;font-weight:700;padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
  .status .d{width:7px;height:7px;border-radius:50%}
  .open{background:rgba(22,163,74,.12);color:#137a3a}.open .d{background:var(--open);animation:beat 1.8s infinite}
  .closing{background:rgba(234,144,6,.14);color:#b06d04}.closing .d{background:var(--closing)}
  .closed{background:#eef2f4;color:#6b7f88}.closed .d{background:var(--closed)}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
  small{color:#5E7C88;font-size:11px;margin-left:8px}
</style>
<span class="status open"><span class="d"></span>운영 중</span><small>초록 점 pulse 애니메이션</small>
<span class="status closing"><span class="d"></span>곧 마감</span><small>마감 임박 경고</small>
<span class="status closed"><span class="d"></span>영업 종료</span><small>비활성 회색</small>
